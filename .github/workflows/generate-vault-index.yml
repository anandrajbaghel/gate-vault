name: Generate Vault Index

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'vault-index.json'

permissions:
  contents: write

# This suppresses the Node 20 warning spam
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 

jobs:
  generate-index:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Run Generator
        run: python scripts/generate-vault-index.py

      - name: Commit Generated Index
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add vault-index.json
          
          # Safer way to check for changes that won't trigger exit code 1
          if [ -n "$(git status --porcelain vault-index.json)" ]; then
            git commit -m "chore: auto-generate vault-index.json"
            git push
            echo "Changes pushed successfully."
          else
            echo "No changes in vault-index.json."
          fi
