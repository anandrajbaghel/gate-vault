name: Generate Vault Index

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate-index:
    # Prevent the workflow from triggering itself after its own commit
    if: github.actor != 'github-actions[bot]'

    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Run Generator
        run: python scripts/generate-vault-index.py

      - name: Commit Generated Index
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet; then
            echo "No changes."
            exit 0
          fi

          git add vault-index.json
          git commit -m "Update vault-index.json"
          git push
